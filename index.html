<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helen Leung — Life Science Investor & Scientist</title>

  <!-- ── SEO & DISCOVERABILITY ── -->
  <meta name="description" content="Helen W. Leung, PhD" />
  <meta name="author" content="Helen W. Leung" />
  <meta name="keywords" content="Helen Leung, nanoscience, drug development, life sciences, health equity, Europe China VC PE, nanomedicine, drug delivery, Oxford, Cambridge, GSK, IET, Altrove" />
  <meta property="og:type"        content="profile" />
  <meta property="og:title"       content="Helen W. Leung, PhD" />
  <meta property="og:description" content="Helen W. Leung, PhD" />
  <meta property="profile:first_name" content="Helen" />
  <meta property="profile:last_name"  content="Leung" />
  <meta name="twitter:card"        content="summary" />
  <meta name="twitter:title"       content="Helen W. Leung, PhD" />
  <meta name="twitter:description" content="Helen W. Leung, PhD" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── DESIGN TOKENS ──────────────────────────────────────── */
    :root {
      --white:        #fafaf8;
      --off-white:    #f5f3ef;
      --slate-light:  #dde4ea;
      --slate:        #6b7d8c;
      --slate-dark:   #3d5166;
      --navy:         #1e3d5c;
      --sage:         #6b9e8c;
      --sage-light:   #aecfc5;
      --ink:          #1a2234;
      --ink-muted:    #5c606e;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'DM Sans', sans-serif;
      --font-zh:      'Noto Sans SC', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { background: linear-gradient(150deg, #fafaf8 0%, #f4f7f5 55%, #f0eeea 100%); font-family: var(--font-body); -webkit-font-smoothing: antialiased; color: var(--ink); }

    /* ── BACKGROUND LAYER ──────────────────────────────────── */
    #bg-layer {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden; pointer-events: none;
    }
    .bg-blob {
      position: absolute; border-radius: 50%;
      filter: blur(90px); opacity: 0.5;
    }
    /* Top-left — sage tint */
    .bg-blob-1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(122,158,142,0.28) 0%, transparent 70%);
      top: -220px; left: -180px;
      animation: blob-drift-1 22s ease-in-out infinite alternate;
    }
    /* Bottom-right — warm off-white shift */
    .bg-blob-2 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(184,208,197,0.3) 0%, transparent 70%);
      bottom: -160px; right: -140px;
      animation: blob-drift-2 28s ease-in-out infinite alternate;
    }
    /* Centre — very subtle navy hint */
    .bg-blob-3 {
      width: 450px; height: 450px;
      background: radial-gradient(circle, rgba(61,81,102,0.07) 0%, transparent 70%);
      top: 35%; left: 45%;
      animation: blob-drift-3 20s ease-in-out infinite alternate;
    }
    @keyframes blob-drift-1 {
      0%   { transform: translate(0,   0)   scale(1);    }
      50%  { transform: translate(50px,-40px) scale(1.06); }
      100% { transform: translate(20px, 50px) scale(0.97); }
    }
    @keyframes blob-drift-2 {
      0%   { transform: translate(0,   0)    scale(1);    }
      50%  { transform: translate(-40px,30px) scale(1.08); }
      100% { transform: translate(30px,-50px) scale(0.95); }
    }
    @keyframes blob-drift-3 {
      0%   { transform: translate(0,  0)    scale(1);    }
      50%  { transform: translate(-30px,40px) scale(1.1); }
      100% { transform: translate(50px,-20px) scale(0.93); }
    }
    /* Ensure app sits above bg */
    #app { position: relative; z-index: 1; }

    /* ── CHINESE FONT OVERRIDES ─────────────────────────────── */
    :lang(zh) body,
    :lang(zh) .nav-btn,
    :lang(zh) .nav-contact,
    :lang(zh) .card-text,
    :lang(zh) .card-item-sub,
    :lang(zh) .pill { font-family: var(--font-zh); }
    :lang(zh) .card-title,
    :lang(zh) .card-item-title,
    :lang(zh) .id-headline { font-family: var(--font-zh); font-weight: 300; }
    :lang(zh) .id-tagline { font-family: var(--font-zh); font-style: normal; }

    /* ── APP SHELL ──────────────────────────────────────────── */
    #app { width: 100vw; height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── NAV ────────────────────────────────────────────────── */
    nav {
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.3rem 2.8rem;
      border-bottom: 1px solid rgba(224,228,232,0.7);
      background: rgba(250,250,248,0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 10;
    }
    .nav-name { font-family: var(--font-display); font-size: 1.25rem; font-weight: 400; color: var(--navy); letter-spacing: 0.02em; text-decoration: none; }
    .nav-right { display: flex; align-items: center; gap: 1.4rem; }
    .nav-switcher { display: flex; gap: 0.2rem; background: var(--off-white); border: 1px solid var(--slate-light); border-radius: 2rem; padding: 0.2rem; }
    .nav-btn { font-family: var(--font-body); font-size: 0.75rem; font-weight: 400; letter-spacing: 0.09em; text-transform: uppercase; color: var(--slate); background: none; border: none; border-radius: 2rem; padding: 0.45rem 1.2rem; cursor: pointer; transition: all 0.25s; }
    .nav-btn.active { background: var(--ink); color: var(--white); }
    .nav-contact { font-size: 0.75rem; letter-spacing: 0.09em; text-transform: uppercase; color: var(--slate); border: 1px solid var(--slate-light); border-radius: 2rem; padding: 0.45rem 1.2rem; cursor: pointer; background: none; transition: all 0.2s; }
    .nav-contact:hover { border-color: var(--sage); color: var(--sage); }

    /* Language toggle */
    #lang-toggle { display: flex; align-items: center; gap: 0.25rem; }
    .lang-btn { font-family: var(--font-body); font-size: 0.72rem; letter-spacing: 0.06em; color: var(--slate); background: none; border: none; cursor: pointer; transition: color 0.2s; padding: 0.15rem 0.2rem; }
    .lang-btn.active { color: var(--navy); font-weight: 500; }
    .lang-btn:hover { color: var(--navy); }
    .lang-sep { color: var(--slate-light); font-size: 0.75rem; line-height: 1; }

    /* ── CANVAS ─────────────────────────────────────────────── */
    #canvas { flex: 1; overflow: hidden; position: relative; }

    /* ── VIEWS ──────────────────────────────────────────────── */
    .view {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
      overflow-y: auto;
      padding: 3rem 2.8rem 4rem;
    }
    .view::-webkit-scrollbar { width: 4px; }
    .view::-webkit-scrollbar-thumb { background: var(--slate-light); border-radius: 2px; }
    .view.visible { opacity: 1; pointer-events: all; }

    /* ── TWO-COLUMN LAYOUT ──────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 3rem;
      max-width: 1060px;
      margin: 0 auto;
      align-items: start;
    }

    /* ── LEFT IDENTITY PANEL ────────────────────────────────── */
    .identity { position: sticky; top: 0; }
    .id-eyebrow { font-size: 0.68rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--sage); margin-bottom: 0.6rem; }
    .id-headline { font-family: var(--font-display); font-size: 3.2rem; font-weight: 400; color: var(--ink); line-height: 1.05; margin-bottom: 1rem; }
    .id-headline em { font-style: italic; color: var(--slate-dark); }
    .id-tagline { font-family: var(--font-display); font-size: 1.1rem; font-style: normal; color: var(--ink); line-height: 1.6; padding-bottom: 1.5rem; border-bottom: 1px solid var(--slate-light); margin-bottom: 1.5rem; text-align: justify; }
    .id-nav { display: none; }
    .id-nav-item { display: flex; align-items: center; gap: 0.6rem; font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--slate); padding: 0.5rem 0.7rem; border-radius: 4px; cursor: pointer; transition: all 0.2s; border: none; background: none; text-align: left; width: 100%; }
    .id-nav-item:hover { background: var(--off-white); color: var(--navy); }
    .id-nav-item.active { background: var(--off-white); color: var(--navy); }
    .id-nav-dash { width: 14px; height: 1px; background: var(--slate-light); flex-shrink: 0; transition: background 0.2s, width 0.2s; }
    .id-nav-item.active .id-nav-dash { background: var(--sage); width: 18px; }

    /* ── PIPELINE INTRO ─────────────────────────────────────── */
    .work-intro {
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.75;
      color: var(--ink);
      max-width: 560px;
      padding: 2rem 0 1.6rem;
    }

    /* ── SIMPLE PAGE (About Me, Publications) ───────────────── */
    .simple-page {
      flex: 1;
      padding: 2rem 2.4rem 3rem;
      overflow-y: auto;
      max-width: 680px;
    }
    .simple-page .card-text {
      font-size: 1rem;
      line-height: 1.75;
      color: var(--ink);
      margin-bottom: 1.2rem;
    }

    /* ── ACCORDION ──────────────────────────────────────────── */
    .accordion { display: flex; flex-direction: column; gap: 0.75rem; }

    /* ── CARD ───────────────────────────────────────────────── */
    .card { border: 1px solid var(--slate-light); border-radius: 6px; overflow: hidden; transition: border-color 0.25s, box-shadow 0.25s; background: var(--off-white); }
    .card:hover { border-color: var(--sage-light); }
    .card.open { border-color: var(--navy); box-shadow: 0 6px 24px rgba(26,46,66,0.09); background: var(--white); }
    .card.featured { background: var(--navy); border-color: var(--navy); }
    .card.featured.open { box-shadow: 0 6px 28px rgba(26,46,66,0.22); }

    /* Card header */
    .card-header { display: flex; justify-content: space-between; align-items: center; padding: 1.3rem 1.6rem; cursor: pointer; user-select: none; }
    .card-tag { font-size: 0.63rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--sage); margin-bottom: 0.3rem; }
    .card.featured .card-tag { color: var(--sage-light); }
    .card-title { font-family: var(--font-display); font-size: 1.2rem; font-weight: 400; color: var(--ink); line-height: 1.2; }
    .card.featured .card-title { color: var(--white); }
    .card-preview { font-size: 0.78rem; color: var(--slate); margin-top: 0.25rem; line-height: 1.5; }
    .card.featured .card-preview { color: rgba(250,250,248,0.45); }
    .card.open .card-preview { display: none; }

    /* Toggle button */
    .card-toggle { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--slate-light); background: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; margin-left: 1rem; transition: all 0.3s; font-size: 1rem; color: var(--slate); line-height: 1; }
    .card:hover .card-toggle { border-color: var(--sage-light); color: var(--navy); }
    .card.open .card-toggle { background: var(--navy); border-color: var(--navy); color: var(--white); transform: rotate(45deg); }
    .card.featured .card-toggle { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.5); }
    .card.featured.open .card-toggle { background: var(--sage); border-color: var(--sage); color: var(--white); }

    /* Card body */
    .card-body { max-height: 0; overflow: hidden; transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1); }
    .card.open .card-body { max-height: 1400px; }
    .card-inner { padding: 0 1.6rem 1.6rem; border-top: 1px solid var(--slate-light); padding-top: 1.2rem; }
    .card.featured .card-inner { border-top-color: rgba(255,255,255,0.1); }

    /* Card text */
    .card-text { font-size: 0.86rem; color: var(--ink-muted); line-height: 1.85; }
    .card.featured .card-text { color: rgba(250,250,248,0.62); }
    .card-text + .card-text { margin-top: 0.8rem; }
    .card-link { color: var(--sage); text-decoration: none; border-bottom: 1px solid currentColor; transition: color 0.2s; }
    .card-link:hover { color: var(--navy); }
    .card.featured .card-link { color: var(--sage-light); }
    .stage-card .card-link { color: var(--sage-light); }
    .stage-card .card-link:hover { color: var(--white); }

    /* Card sub-items */
    .card-items { margin-top: 1.2rem; display: flex; flex-direction: column; gap: 0.7rem; }
    .card-item { background: var(--white); border: 1px solid var(--slate-light); border-radius: 4px; padding: 0.9rem 1.1rem; transition: border-color 0.2s; }
    .card-item:hover { border-color: var(--sage-light); }
    .card.featured .card-item { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.12); }
    .card-item-title { font-family: var(--font-display); font-size: 1rem; font-weight: 400; color: var(--ink); margin-bottom: 0.2rem; }
    .card.featured .card-item-title { color: var(--white); }
    .card-item-sub { font-size: 0.78rem; color: var(--slate); line-height: 1.5; }
    .card.featured .card-item-sub { color: rgba(250,250,248,0.45); }
    .card-item-badge { display: inline-block; font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sage); border: 1px solid var(--sage-light); border-radius: 1rem; padding: 0.18rem 0.55rem; margin-top: 0.45rem; }
    .card.featured .card-item-badge { border-color: rgba(122,158,142,0.4); color: var(--sage-light); }

    /* Publication rows */
    .pub-rows { margin-top: 1.2rem; }
    .pub-row { display: grid; grid-template-columns: 2.6rem 1fr; gap: 0.8rem; padding: 0.9rem 0; border-bottom: 1px solid var(--slate-light); }
    .pub-row:first-child { border-top: 1px solid var(--slate-light); }
    .pub-year { font-family: var(--font-display); font-size: 0.82rem; color: var(--slate); padding-top: 2px; }
    .pub-title { font-size: 0.85rem; color: var(--ink); line-height: 1.45; margin-bottom: 0.15rem; }
    .pub-journal { font-size: 0.73rem; color: var(--slate); font-style: italic; }

    /* Google Scholar link */
    .scholar-link { display: block; margin-top: 0.9rem; margin-bottom: 0.2rem; font-size: 0.78rem; color: var(--sage); text-decoration: none; letter-spacing: 0.03em; transition: color 0.2s; }
    .scholar-link:hover { color: var(--navy); }

    /* Tag pills */
    .pill-row { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 1rem; }
    .pill { font-size: 0.68rem; letter-spacing: 0.06em; color: var(--slate-dark); background: var(--white); border: 1px solid var(--slate-light); border-radius: 2rem; padding: 0.28rem 0.75rem; }
    .card.featured .pill { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); color: rgba(250,250,248,0.65); }

    /* ── IDENTITY PHOTO (About Me left column) ──────────────── */
    .identity-photo-wrap { margin-bottom: 1.4rem; }
    .identity-photo {
      width: 118px; height: 118px;
      border-radius: 50%; overflow: hidden;
      border: 2px solid var(--slate-light);
      background: var(--off-white);
      display: flex; align-items: center; justify-content: center;
    }
    .identity-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .identity-photo-initials { font-family: var(--font-display); font-size: 2rem; color: var(--slate); letter-spacing: 0.02em; }

    /* ── PROFILE PHOTO (fixed, now hidden — replaced by identity photo) */
    #profile-photo { display: none; }

    .profile-initials { font-family: var(--font-display); font-size: 0.95rem; color: var(--slate); letter-spacing: 0.02em; }

    /* ── LINKEDIN + SCHOLAR FABs ────────────────────────────── */
    #linkedin-fab { position: fixed; bottom: 1.6rem; left: 1.6rem; width: 40px; height: 40px; border-radius: 50%; background: var(--navy); color: var(--white); display: flex; align-items: center; justify-content: center; text-decoration: none; font-family: var(--font-body); font-size: 0.8rem; font-weight: 500; transition: background 0.2s, transform 0.2s; z-index: 50; box-shadow: 0 2px 12px rgba(26,46,66,0.22); }
    #linkedin-fab:hover { background: #0a66c2; transform: translateY(-2px); }
    #scholar-fab { position: fixed; bottom: 4.2rem; left: 1.6rem; width: 40px; height: 40px; border-radius: 50%; background: var(--sage); color: var(--white); display: flex; align-items: center; justify-content: center; text-decoration: none; font-family: var(--font-body); font-size: 0.62rem; font-weight: 500; letter-spacing: 0.02em; transition: background 0.2s, transform 0.2s; z-index: 50; box-shadow: 0 2px 12px rgba(26,46,66,0.18); }
    #scholar-fab:hover { background: var(--navy); transform: translateY(-2px); }

    /* ── CONTACT MODAL ──────────────────────────────────────── */
    #contact-modal { position: fixed; inset: 0; z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    #contact-modal.open { opacity: 1; pointer-events: all; }
    #cm-bg { position: absolute; inset: 0; background: rgba(26,46,66,0.35); backdrop-filter: blur(3px); }
    .contact-box { position: relative; z-index: 1; background: var(--navy); color: var(--white); border-radius: 8px; padding: 2.8rem 3.2rem; max-width: 420px; width: 90%; }
    .contact-box h2 { font-family: var(--font-display); font-size: 2.2rem; font-weight: 300; margin-bottom: 0.4rem; }
    .contact-box h2 em { font-style: italic; color: var(--sage-light); }
    #cm-sub { font-size: 0.83rem; color: rgba(250,250,248,0.5); margin-bottom: 2rem; line-height: 1.7; }
    .c-link { display: flex; align-items: center; gap: 0.8rem; padding: 0.9rem 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.82rem; color: rgba(250,250,248,0.65); text-decoration: none; transition: color 0.2s; }
    .c-link:hover { color: var(--sage-light); }
    .c-link:last-child { border-bottom: none; }
    .c-icon { font-size: 0.95rem; width: 1.2rem; text-align: center; }
    .contact-x { position: absolute; top: 1.1rem; right: 1.3rem; background: none; border: none; color: rgba(255,255,255,0.35); font-size: 1.1rem; cursor: pointer; transition: color 0.2s; }
    .contact-x:hover { color: var(--white); }

    /* ── PIPELINE (My Work view) ──────────────────────────────── */

    /* Pipeline body: flex column so stages fill the available page height */
    .pipeline-body {
      position: relative;
      display: flex; flex-direction: column;
      min-height: calc(100vh - 270px);
    }

    /* Continuous vertical spine line (pseudo-element) */
    .pipeline-body::before {
      content: ''; position: absolute;
      left: 50%; transform: translateX(-50%);
      top: 0; bottom: 0; width: 1px;
      background: var(--slate-light); z-index: 0;
    }

    /* ── STAGE ROW ── 5-column grid: text | badge | dot | badge | text */
    .pipeline-stage {
      display: grid;
      grid-template-columns: 1fr 56px 40px 56px 1fr;
      align-items: center;
      cursor: pointer;
      flex: 1;                    /* grow to fill pipeline-body height */
      min-height: 90px;           /* minimum row height */
      position: relative; z-index: 1;
      user-select: none;
    }
    /* Card wraps and arrows don't grow — stages get all the space */
    .stage-card-wrap, .spine-arrow { flex: 0 0 auto; }

    /* Column shorthands */
    .s-text-l { text-align: right; padding-right: 0.6rem; }
    .s-text-r { text-align: left;  padding-left:  0.6rem; }
    .s-badge-l { display: flex; justify-content: flex-end;   align-items: center; }
    .s-badge-r { display: flex; justify-content: flex-start; align-items: center; }
    .s-dot     { display: flex; justify-content: center;     align-items: center; position: relative; }

    /* Mobile-only row (hidden on desktop) */
    .stage-mobile { display: none; }

    /* ── STAGE DOT ── */
    .stage-dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--white); border: 2px solid var(--navy);
      flex-shrink: 0; z-index: 2; transition: all 0.3s;
    }
    .pipeline-stage:hover  .stage-dot { background: var(--sage-light); border-color: var(--sage); }
    .pipeline-stage.selected .stage-dot { background: var(--sage); border-color: var(--sage); box-shadow: 0 0 0 5px rgba(184,208,197,0.45); }

    /* ── INSTITUTION BADGE ── */
    .stage-badge {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--white); border: 1.5px solid var(--slate-light);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; position: relative;
      font-size: 0.52rem; font-weight: 600; color: var(--navy);
      letter-spacing: 0.07em; text-transform: uppercase;
      transition: all 0.25s; z-index: 2;
    }
    .stage-badge img { width: 28px; height: 28px; object-fit: contain; display: block; }
    .pipeline-stage:hover  .stage-badge { border-color: var(--sage-light); box-shadow: 0 2px 10px rgba(26,46,66,0.1); }
    /* Selected main badge: white fill + thick navy ring */
    .pipeline-stage.selected .stage-badge:not(.extra-badge) { background: var(--white); border-color: var(--navy); border-width: 3px; color: var(--navy); box-shadow: 0 0 0 2px rgba(26,46,66,0.12); }

    /* Horizontal connector: badge → dot (20px = half of the 40px dot-col) */
    .s-badge-l .stage-badge::after,
    .s-badge-r .stage-badge::after {
      content: ''; position: absolute;
      top: 50%; transform: translateY(-50%);
      width: 20px; height: 1px; background: var(--slate-light);
    }
    .s-badge-l .stage-badge::after { right: -20px; }
    .s-badge-r .stage-badge::after { left:  -20px; }

    /* Two-badge cluster (both on right side, stacked) */
    .s-badge-r.two-up {
      flex-direction: column; gap: 0.45rem; align-items: flex-start;
      position: relative;
    }
    /* Suppress individual connectors; draw one at the midpoint instead */
    .s-badge-r.two-up .stage-badge::after { display: none; }
    .s-badge-r.two-up::before {
      content: ''; position: absolute;
      left: -20px; top: 50%; transform: translateY(-50%);
      width: 20px; height: 1px; background: var(--slate-light);
    }

    /* Two-badge cluster (both on left side, stacked) */
    .s-badge-l.two-up {
      flex-direction: column; gap: 0.45rem; align-items: flex-end;
      position: relative;
    }
    .s-badge-l.two-up .stage-badge::after { display: none; }
    .s-badge-l.two-up::before {
      content: ''; position: absolute;
      right: -20px; top: 50%; transform: translateY(-50%);
      width: 20px; height: 1px; background: var(--slate-light);
    }

    /* ── STAGE TEXT ── */

      font-family: var(--font-display); font-size: 1.3rem; font-weight: 400;

    .pipeline-stage.selected .stage-label { color: var(--ink); }
    .stage-sublabel { font-size: 0.75rem; color: var(--slate); line-height: 1.45; }

    /* Dual-badge stage: whole row not clickable, cursor reverts */
    .pipeline-stage.no-stage-click { cursor: default; }
    .pipeline-stage.no-stage-click .stage-badge { cursor: pointer; }

    /* Extra-badge (Oxford) selected state */
    .pipeline-stage.left-selected .stage-dot { background: var(--sage); border-color: var(--sage); box-shadow: 0 0 0 5px rgba(184,208,197,0.45); }
    .pipeline-stage.left-selected .stage-badge.extra-badge { background: var(--white); border-color: var(--navy); border-width: 3px; color: var(--navy); box-shadow: 0 0 0 2px rgba(26,46,66,0.12); }

<script>
// ── STATE ───────────────────────────────────────────────────
let lang             = 'en';
let currentView      = 'about';
let selectedStageIdx = -1;   // which stage's main (right) card is open
let selectedLeftIdx  = -1;   // which stage's left-badge card is open

// ── LANGUAGE HELPER ─────────────────────────────────────────
function L(field) {
  if (field === null || field === undefined) return '';
  if (typeof field === 'string') return field;
  return field[lang] ?? field.en ?? '';
}

// ── RENDER WORK (pipeline timeline) ─────────────────────────
function renderWorkView() {
  const data = CONTENT.work;
  // Bio text is sourced from CONTENT.about.tagline — same text as the About Me panel
  document.getElementById('work-tagline').textContent  = L(CONTENT.about.tagline);

  // Left nav — all 4 stages
  document.getElementById('work-nav').innerHTML = data.pipeline.map((stage, i) =>
    `<button class="id-nav-item${i === selectedStageIdx ? ' active' : ''}" onclick="selectStage(${i})">
      <span class="id-nav-dash"></span>${L(stage.title)}
    </button>`
  ).join('');

  // Tab strip (mobile)
  document.getElementById('work-tabs').innerHTML = data.pipeline.map((stage, i) =>
    `<button class="tab-item${i === selectedStageIdx ? ' active' : ''}" onclick="selectStage(${i})">${L(stage.title)}</button>`
  ).join('');

  // Build pipeline HTML
  const stagesHTML = data.pipeline.map((stage, i) => {
    const side           = i % 2 === 0 ? 'left' : 'right';
    const isSelected     = i === selectedStageIdx;
    const isLeftSelected = i === selectedLeftIdx;
    const lb             = stage.leftBadge;
    // Dual-badge: lb exists on either side
    const isDual         = !!lb;

    // Main badge
    const mainBadge = `<div class="stage-badge" title="${L(stage.badgeLabel)}"
        onclick="event.stopPropagation(); selectStage(${i})">
      ${stage.badgeImg ? `<img src="${stage.badgeImg}" alt="${L(stage.badgeLabel)}">` : `<span>${stage.badgeAbbr}</span>`}
    </div>`;

    // Extra (Oxford) badge — carries class 'extra-badge' so CSS can target it independently
    const extraBadge = lb ? `<div class="stage-badge extra-badge" title="${L(lb.label)}"
        onclick="event.stopPropagation(); selectLeftBadge(${i})">
      ${lb.img ? `<img src="${lb.img}" alt="${L(lb.label)}">` : `<span>${lb.abbr}</span>`}
    </div>` : '';

    // Column assignments
    let slTextL = '', slBadgeL = '', badgeLClass = 's-badge-l', badgeRClass = 's-badge-r', slBadgeR = '', slTextR = '';

    if (isDual && side === 'right') {
      // Both badges stacked on the right; main (GSK) on top, extra (Oxford) below
      badgeRClass = 's-badge-r two-up';
      slBadgeR    = mainBadge + extraBadge;
      slTextR     = `<p class="stage-label">${L(stage.title)}</p><p class="stage-sublabel">${L(stage.sublabel)}</p>`;
    } else if (isDual && side === 'left') {
      // Both badges stacked on the left; main (LEK) on top, extra (MS) below
      badgeLClass = 's-badge-l two-up';
      slBadgeL    = mainBadge + extraBadge;
      slTextL     = `<p class="stage-label">${L(stage.title)}</p><p class="stage-sublabel">${L(stage.sublabel)}</p>`;
    } else if (side === 'left') {
      slTextL  = `<p class="stage-label">${L(stage.title)}</p><p class="stage-sublabel">${L(stage.sublabel)}</p>`;
      slBadgeL = mainBadge;
    } else {
      slBadgeR = mainBadge;
      slTextR  = `<p class="stage-label">${L(stage.title)}</p><p class="stage-sublabel">${L(stage.sublabel)}</p>`;
    }

    // Dual-badge stages: the row itself is not clickable (badges handle it)
    const stageOnclick = isDual ? '' : `onclick="selectStage(${i})"`;
    const stageClass = [
      'pipeline-stage', side,
      isSelected     ? 'selected'      : '',
      isLeftSelected ? 'left-selected' : '',
      isDual         ? 'no-stage-click': ''
    ].filter(Boolean).join(' ');

    // Card for the extra (Oxford) badge
    const leftCardHTML = lb ? `<div class="stage-card-wrap left-card${isLeftSelected ? ' open' : ''}" data-stage="${i}">
      <div class="stage-card">
        <p class="stage-card-tag">${L(lb.tag)}</p>
        ${L(lb.body)}
      </div>
    </div>` : '';

    const arrowHTML = i < data.pipeline.length - 1 ? '<div class="spine-arrow"></div>' : '';

    return `<div class="${stageClass}" ${stageOnclick}>
      <div class="s-text-l">${slTextL}</div>
      <div class="${badgeLClass}">${slBadgeL}</div>
      <div class="s-dot"><div class="stage-dot"></div></div>
      <div class="${badgeRClass}">${slBadgeR}</div>
      <div class="s-text-r">${slTextR}</div>
      <div class="stage-mobile">
        ${isDual ? `
          <div class="stage-mobile-row" onclick="event.stopPropagation(); selectStage(${i})">
            <div class="stage-badge" title="${L(stage.badgeLabel)}">
              ${stage.badgeImg ? `<img src="${stage.badgeImg}" alt="${L(stage.badgeLabel)}">` : `<span>${stage.badgeAbbr}</span>`}
            </div>
            <div>
              <p class="stage-label">${L(stage.title)}</p>
              <p class="stage-sublabel">${L(stage.sublabel)}</p>
            </div>
          </div>
          <div class="stage-mobile-row" onclick="event.stopPropagation(); selectLeftBadge(${i})">
            <div class="stage-badge extra-badge" title="${L(lb.label)}">
              ${lb.img ? `<img src="${lb.img}" alt="${L(lb.label)}">` : `<span>${lb.abbr}</span>`}
            </div>
            <div>
              <p class="stage-label">${L(lb.title)}</p>
              <p class="stage-sublabel">${L(lb.sublabel)}</p>
            </div>
          </div>
        ` : `
          <div class="stage-mobile-row" onclick="event.stopPropagation(); selectStage(${i})">
            <div class="stage-badge" title="${L(stage.badgeLabel)}">
              ${stage.badgeImg ? `<img src="${stage.badgeImg}" alt="${L(stage.badgeLabel)}">` : `<span>${stage.badgeAbbr}</span>`}
            </div>
            <div>
              <p class="stage-label">${L(stage.title)}</p>
              <p class="stage-sublabel">${L(stage.sublabel)}</p>
            </div>
          </div>
        `}
      </div>
    </div>
    ${leftCardHTML}
    <div class="stage-card-wrap main-card${isSelected ? ' open' : ''}" data-stage="${i}">
      <div class="stage-card">
        <p class="stage-card-tag">${L(stage.tag)}</p>
        ${L(stage.body)}
      </div>
    </div>
    ${arrowHTML}`;
  }).join('');

  document.getElementById('work-pipeline').innerHTML =
    `<p class="work-intro">${L(data.intro)}</p><div class="pipeline-body">${stagesHTML}</div>`;
}

function selectStage(idx) {
  const wasSelected = selectedStageIdx === idx;
  selectedStageIdx  = wasSelected ? -1 : idx;
  selectedLeftIdx   = -1;

  document.querySelectorAll('#work-pipeline .pipeline-stage').forEach((el, i) => {
    el.classList.toggle('selected', i === selectedStageIdx);
    el.classList.remove('left-selected');
  });
  document.querySelectorAll('#work-pipeline .stage-card-wrap.main-card').forEach((el, i) =>
    el.classList.toggle('open', i === selectedStageIdx)
  );
  document.querySelectorAll('#work-pipeline .stage-card-wrap.left-card').forEach(el =>
    el.classList.remove('open')
  );
  document.querySelectorAll('#work-nav .id-nav-item').forEach((el, i) =>
    el.classList.toggle('active', i === selectedStageIdx)
  );
  document.querySelectorAll('#work-tabs .tab-item').forEach((el, i) =>
    el.classList.toggle('active', i === selectedStageIdx)
  );

  if (!wasSelected) {
    setTimeout(() => {
      const sel = document.querySelector('#work-pipeline .pipeline-stage.selected');
      const view = document.getElementById('view-work');
      if (sel && view) {
        const offset = sel.getBoundingClientRect().top - view.getBoundingClientRect().top;
        view.scrollBy({ top: offset, behavior: 'smooth' });
      }
    }, 80);
  }
}

function selectLeftBadge(stageIdx) {
  const wasSelected = selectedLeftIdx === stageIdx;
  selectedLeftIdx  = wasSelected ? -1 : stageIdx;
  selectedStageIdx = -1;

  document.querySelectorAll('#work-pipeline .pipeline-stage').forEach((el, i) => {
    el.classList.remove('selected');
    el.classList.toggle('left-selected', i === selectedLeftIdx);
  });
  document.querySelectorAll('#work-pipeline .stage-card-wrap.left-card').forEach(el => {
    el.classList.toggle('open', parseInt(el.dataset.stage) === selectedLeftIdx);
  });
  document.querySelectorAll('#work-pipeline .stage-card-wrap.main-card').forEach(el =>
    el.classList.remove('open')
  );
  document.querySelectorAll('#work-nav .id-nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('#work-tabs .tab-item').forEach(el => el.classList.remove('active'));

  if (!wasSelected) {
    setTimeout(() => {
      const open = document.querySelector('#work-pipeline .stage-card-wrap.left-card.open');
      const view = document.getElementById('view-work');
      if (open && view) {
        const offset = open.getBoundingClientRect().top - view.getBoundingClientRect().top;
        view.scrollBy({ top: offset, behavior: 'smooth' });
      }
    }, 80);
  }
}


// ── SIMPLE VIEW RENDERERS ────────────────────────────────────
function renderAboutSimple() {
  const about = CONTENT.about;
  document.getElementById('about-tagline').textContent = L(about.tagline);
  const bg = about.cards[0];
  document.getElementById('about-content').innerHTML = L(bg.body);
}

function renderPublicationsSimple() {
  const about = CONTENT.about;
  document.getElementById('publications-tagline').textContent = L(about.tagline);
  const pubs = about.cards[1];
  document.getElementById('publications-content').innerHTML = L(pubs.body);
}

function renderAll() {
  renderWorkView();
  renderAboutSimple();
  renderPublicationsSimple();
}

// ── VIEW SWITCH ─────────────────────────────────────────────
function switchView(view) {
  currentView = view;
  ['work', 'about', 'publications'].forEach(v => {
    document.getElementById(`view-${v}`).classList.toggle('visible', v === view);
    document.getElementById(`btn-${v}`).classList.toggle('active',   v === view);
  });
}

// Link from pipeline cards → Publications tab
function openAboutCard(idx) {
  switchView('publications');
}


// ── PAPER SUMMARY TOGGLE ────────────────────────────────────
function togglePubSummary(btn) {
  const expand = btn.closest('.pub-link-item').querySelector('.pub-expand');
  const isOpen = expand.classList.toggle('open');
  btn.textContent = isOpen ? '↑ Hide key takeaways' : '↓ Read my (non-technical) key takeaways';
  btn.setAttribute('aria-expanded', isOpen);
}

// ── LANGUAGE SWITCH ─────────────────────────────────────────
function switchLang(l) {
  lang = l;
  document.documentElement.lang = l;
  document.getElementById('lang-en').classList.toggle('active', l === 'en');
  document.getElementById('lang-zh').classList.toggle('active', l === 'zh');
  renderAll();
  updateUIStrings();
}

function updateUIStrings() {
  const S = UI[lang];
  document.getElementById('btn-about').textContent        = S.navAbout;
  document.getElementById('btn-publications').textContent = S.navPublications;
  document.getElementById('btn-work').textContent         = S.navWork;
  document.getElementById('cm-heading').innerHTML         = S.cmHeading;
  document.getElementById('cm-sub').textContent           = S.cmSub;
}

// ── CONTACT ─────────────────────────────────────────────────
function openContact()  { document.getElementById('contact-modal').classList.add('open');    }
function closeContact() { document.getElementById('contact-modal').classList.remove('open'); }

// ── INIT ─────────────────────────────────────────────────────
renderAll();
updateUIStrings();
</script>
